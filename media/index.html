<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VSCode Extension Grouper</title>
  <style>
    body { font-family: sans-serif; background: #1e1e1e; color: #fff; margin: 0; }
    #top, #middle, #bottom { padding: 10px; }
    #top { background: #333; height: 60px; display: flex; align-items: center; }
    #middle { background: #222; display: flex; gap: 8px; align-items: center; }
    #bottom { display: grid; grid-template-columns: repeat(auto-fill, 60px); gap: 8px; margin-top: 10px; }
    .icon { width: 60px; height: 60px; border-radius: 8px; background: #444; display: flex; justify-content: center; align-items: center; cursor: pointer; }
    .icon:hover { background: #666; }
    button, select { background: #444; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
    button:hover, select:hover { background: #555; }
  </style>
</head>
<body>
  <div id="top">Hover over an icon to see name & description</div>
  <div id="middle">
    <button id="createGroup">Create Group</button>
    <button id="deleteGroup">Delete Group</button>
    <select id="groupList"></select>
    <button id="assign">Assign</button>
    <button id="activate">Activate</button>
    <button id="deactivate">Deactivate</button>
    <button id="backup">Backup</button>
  </div>
  <div id="bottom"></div>

  <script>
    const vscode = acquireVsCodeApi();
    const top = document.getElementById('top');
    const bottom = document.getElementById('bottom');

    vscode.postMessage({ command: 'getExtensions' });

    window.addEventListener('message', event => {
      const message = event.data;
      if (message.command === 'extensions') {
        bottom.innerHTML = '';
        message.data.forEach(ext => {
          const div = document.createElement('div');
          div.className = 'icon';
          div.title = ext.name + ' — ' + ext.description;
          div.textContent = ext.name[0];
          div.addEventListener('mouseenter', () => {
            top.textContent = `${ext.name} — ${ext.description}`;
          });
          bottom.appendChild(div);
        });
      }
    });
  </script>
</body>
</html>
